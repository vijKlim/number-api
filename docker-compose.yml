services:
  app:
    build:
      context: .
    container_name: number-api-app
    working_dir: /app
    environment:
      API_KEY: dev-secret-key
    volumes:
      - ./:/app

  nginx:
    image: nginx:1.27-alpine
    container_name: number-api-nginx
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
